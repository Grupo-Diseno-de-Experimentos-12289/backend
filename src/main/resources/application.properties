#Spring Application Name
spring.application.name=travelmatch

# Spring DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelmatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# Spring Data JPA Configuration
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=pe.edu.upc.travelmatch.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
# Trust the reverse proxy's X-Forwarded-* headers (Render, Railway, etc.) so
# Swagger/redirects report https instead of http and avoid mixed-content issues.
server.forward-headers-strategy=framework

# JWT Configuration Properties
authorization.jwt.secret=${JWT_SECRET:SecretStringForTokensSignInCredentials}
authorization.jwt.expiration.days=7

# Stripe Secret Keys
stripe.secret=${STRIPE_SECRET:sk_test_tu_clave_secreta}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_tu_webhook_secret}

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true

